name: CI - Build and Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest   # Windows required for .NET Framework 4.8

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up .NET (includes MSBuild for .NET Framework)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'   # SDK used to restore/build the project

      # 3. Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore CybersecurityChatbot/CybersecurityChatbot.csproj

      # 4. Build the project (checks for compile errors)
      - name: Build project
        run: dotnet build CybersecurityChatbot/CybersecurityChatbot.csproj --configuration Release --no-restore

      # 5. Confirm build succeeded
      - name: Confirm build success
        run: echo "Build completed successfully - no syntax or compile errors found."
