name: CI - Build and Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest   # Windows required for .NET Framework 4.8

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Use NuGet + MSBuild to restore and build a .NET Framework 4.8 project
      #    (Using `dotnet` SDK 8.0 can fail for legacy .NET Framework projects.)
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Restore NuGet packages
        run: nuget restore CybersecurityChatbot/CybersecurityChatbot.csproj

      - name: Build project with MSBuild
        run: msbuild CybersecurityChatbot/CybersecurityChatbot.csproj /p:Configuration=Release

      # 5. Confirm build succeeded
      - name: Confirm build success
        run: echo "Build completed successfully - no syntax or compile errors found."
