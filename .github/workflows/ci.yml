name: CI - Build and Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest   # Windows required for .NET Framework 4.8
    env:
      # Allow use of Node.js 20 for javascript-based actions (opt out of Node.js 24)
      # This keeps actions that expect Node 20 running for now.
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Use NuGet + MSBuild to restore and build a .NET Framework 4.8 project
      #    (Using `dotnet` SDK 8.0 can fail for legacy .NET Framework projects.)
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Restore NuGet packages (solution)
        run: nuget restore CybersecurityChatbot.sln

      - name: Setup MSBuild (Visual Studio)
        uses: microsoft/setup-msbuild@v1
        with:
          vs-version: 'latest'

      - name: Show MSBuild location
        run: where msbuild || echo "msbuild not on PATH"

      - name: Build solution with MSBuild
        run: msbuild CybersecurityChatbot.sln /p:Configuration=Release /m

      # 5. Confirm build succeeded
      - name: Confirm build success
        run: echo "Build completed successfully - no syntax or compile errors found."
